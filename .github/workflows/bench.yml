name: Benchmark

on:
  schedule:
    - cron: "23 5 * * 1"
  workflow_dispatch:

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm bench
      - uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: packages/core/bench-results.json
